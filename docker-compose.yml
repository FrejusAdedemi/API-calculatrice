services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
    - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - database
    networks:
      - calc-network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - calc-network

  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: calculatrice
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - calc-network

networks:
  calc-network:
    driver: bridge

volumes:
  postgres-data: