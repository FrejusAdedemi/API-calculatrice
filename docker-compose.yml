services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - calc-network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - calc-network

  database:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=calculatrice
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - calc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d calculatrice"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - calc-network

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    networks:
      - calc-network

networks:
  calc-network:
    driver: bridge

volumes:
  postgres-data: